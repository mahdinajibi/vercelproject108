<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ghost Proxy UI</title>
</head>
<body>
  <h1>Ghost Layer</h1>
  <button onclick="send()">Fetch Data</button>
  <pre id="output"></pre>

  <script>
    async function send() {
      const res = await fetch("/api/handler");
      const data = await res.json();
      document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
