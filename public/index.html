<!DOCTYPE html>
<html>
<head>
  <title>Metrics</title>
</head>
<body>
  <h2>System Metrics</h2>
  <button onclick="run()">Check</button>
  <pre id="out"></pre>

  <script>
    async function run(){
      const r = await fetch('/api/metrics');
      const j = await r.json();
      document.getElementById('out').innerText =
        JSON.stringify(j, null, 2);
    }
  </script>
</body>
</html>
